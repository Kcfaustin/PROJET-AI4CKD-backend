name: Nephrosuivi -  PRODUCTION Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json
        coverage: none

    - name: Create Laravel directories
      run: |
        mkdir -p storage/framework/{sessions,views,cache,testing}
        mkdir -p storage/logs
        mkdir -p bootstrap/cache

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

    - name: Run manual post-install scripts
      run: |
        php artisan storage:link --ansi || true
        php -r "file_exists('storage/api-docs') || mkdir('storage/api-docs', 0755, true);" || true
        php artisan l5-swagger:generate || true

    - name: Validate Laravel configuration
      run: |
        php artisan config:clear
        php artisan route:clear
        php artisan view:clear

    - name: Set permissions
      run: |
        chmod -R 775 storage bootstrap/cache

    - name: Validate required secrets
      run: |
        : "Checking required secrets for PRODUCTION"
        if [ -z "${{ secrets.SSH_PRIVATE_KEY_DEV }}" ]; then echo "Missing secret: SSH_PRIVATE_KEY_DEV"; exit 1; fi
        if [ -z "${{ secrets.SSH_HOST_DEV }}" ]; then echo "Missing secret: SSH_HOST_DEV"; exit 1; fi
        if [ -z "${{ secrets.SSH_USER_DEV }}" ]; then echo "Missing secret: SSH_USER_DEV"; exit 1; fi
        if [ -z "${{ secrets.SSH_PORT_DEV }}" ]; then echo "Missing secret: SSH_PORT_DEV"; exit 1; fi

    - name: Deploy to Hostinger (PRODUCTION) via SSH
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
        REMOTE_HOST: ${{ secrets.SSH_HOST_DEV }}
        REMOTE_USER: ${{ secrets.SSH_USER_DEV }}
        REMOTE_PORT: ${{ secrets.SSH_PORT_DEV }}
        TARGET: /home/${{ secrets.SSH_USER_DEV }}/domains/nephrosuiviapi.faustinagh.me
        EXCLUDE: ".git, .github, node_modules, tests, .env, .env.example, storage/logs/, .phpunit.result.cache, phpunit.xml, README.md"

    - name: Run post-deployment commands (PRODUCTION)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST_DEV }}
        username: ${{ secrets.SSH_USER_DEV }}
        key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
        port: ${{ secrets.SSH_PORT_DEV }}
        script: |
          cd /home/${{ secrets.SSH_USER_DEV }}/domains/nephrosuiviapi.faustinagh.me

          # Create necessary directories
          mkdir -p storage/framework/{sessions,views,cache,testing}
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

          # Clear all caches
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          php artisan cache:clear

          # Rebuild optimized caches (without view cache on first run)
          php artisan config:cache
          php artisan route:cache

          # Try view cache separately with error handling
          php artisan view:cache || echo "View cache skipped"

          # Run optimize without view cache if needed
          php artisan optimize || php artisan optimize --no-view-cache

          # Storage link
          php artisan storage:link || echo "Storage link already exists"

          # L5 Swagger
          php artisan l5-swagger:generate || echo "Swagger generation skipped"

          # Set proper permissions
          chmod -R 775 storage bootstrap/cache

          echo "✅ PRODUCTION deployment completed successfully!"

    - name: Verify deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST_DEV }}
        username: ${{ secrets.SSH_USER_DEV }}
        key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
        port: ${{ secrets.SSH_PORT_DEV }}
        script: |
          cd /home/${{ secrets.SSH_USER_DEV }}/domains/nephrosuiviapi.faustinagh.me
          echo "📊 Deployment verification:"
          echo "- Laravel version: $(php artisan --version)"
          echo "- PHP version: $(php -v | head -n 1)"
          echo "- Directory: $(pwd)"
          echo "- Last commit: $(git log -1 --oneline 2>/dev/null || echo 'No git info')"
          echo "- Storage directories:"
          ls -la storage/framework/ || echo "Storage framework not found"

    - name: Deployment notification
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 PRODUCTION deployment successful!"
          echo "✅ Website: https://nephrosuiviapi.faustinagh.me/"
        else
          echo "❌ PRODUCTION deployment failed!"
          echo "⚠️  Check the logs and restore from backup if needed"
        fi
