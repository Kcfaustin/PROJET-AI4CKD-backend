name: Deploy to Heroku

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_pgsql, openssl
          ini-values: post_max_size=256M, upload_max_filesize=256M

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader --no-interaction

      - name: Install NPM dependencies
        run: |
          npm ci
          npm run build

      - name: Build assets (if any)
        run: echo "Assets built"

      - name: Run PHPunit tests
        if: always()
        run: |
          if [ -f ./vendor/bin/phpunit ]; then
            ./vendor/bin/phpunit --colors=always || true
          else
            echo "No phpunit binary found, skipping tests"
          fi

      - name: Notes
        run: |
          echo "This workflow builds dependencies and runs tests only."
          echo "Automatic deploy to Heroku should be enabled via Heroku's GitHub integration."
